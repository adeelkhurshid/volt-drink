    <style>
       body { background-color: #050505; color: #FFF; margin: 0; font-family: 'Inter', sans-serif; }

       .blog-card__image { width: 100%; aspect-ratio: 16/10; object-fit: cover; background: #222; }
       .blog-card__category { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--color-electric-blue); font-family: 'JetBrains Mono'; }
       .blog-card__title { font-family: 'Teko', sans-serif; font-size: 32px; margin: 0; }
       .blog-card__link { margin-top: auto; text-decoration: underline; color: #888; }
